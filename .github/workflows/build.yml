name: Gerar APK Flet Online

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Permite que você ative o botão manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Configurar o Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar o Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.3'

    - name: Instalar Dependências do Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Gerar o APK pelo Flet
      run: |
        flet build apk

    - name: Disponibilizar o APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: app-wartale-release
        path: build/apk/*.apk
